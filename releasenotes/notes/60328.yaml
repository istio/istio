apiVersion: release-notes/v2
kind: bug-fix
area: traffic-management
issue:
  - 60328

releaseNotes:
  - |
    **Fixed** a fatal `concurrent map writes` panic in the istio-cni agent when
    two pods were added to the ambient mesh on the same node at the same time.
    The native nftables rule builder was held on a shared field of the
    `NftablesConfigurator` and mutated without synchronization; the builder is
    now scoped per-call and passed through the rule programming path.
  - |
    **Added** a startup probe that verifies the bundled `nft` binary supports
    JSON output. The native nftables backend uses `nft --json list ...` to read
    set membership during pod removal. On hosts whose `nft` was built without
    libjansson those calls fail with `Error: JSON support not compiled-in` on
    every removal, the CNI agent retries indefinitely, and pod IPs leak into
    the `istio-inpod-probes-v4`/`-v6` sets. The probe now detects this at
    startup and falls back to the iptables backend, which talks to the kernel
    via `iptables-nft` on modern distros so the data path still uses the
    nftables kernel subsystem.
