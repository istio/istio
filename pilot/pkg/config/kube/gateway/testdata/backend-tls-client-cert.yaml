apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: istio
spec:
  controllerName: istio.io/gateway-controller
---
# Gateway with a valid clientCertificateRef - should have ResolvedRefs=True
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: backend-tls-valid
  namespace: istio-system
spec:
  tls:
    backend:
      clientCertificateRef:
        group: ""
        kind: Secret
        name: my-cert-http
  addresses:
  - value: istio-ingressgateway
    type: Hostname
  gatewayClassName: istio
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
---
# Gateway with a nonexistent secret - should have ResolvedRefs=False/InvalidClientCertificateRef
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: backend-tls-nonexistent
  namespace: istio-system
spec:
  tls:
    backend:
      clientCertificateRef:
        group: ""
        kind: Secret
        name: does-not-exist
  addresses:
  - value: istio-ingressgateway
    type: Hostname
  gatewayClassName: istio
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
---
# Gateway with an unsupported kind - should have ResolvedRefs=False/InvalidClientCertificateRef
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: backend-tls-unsupported-kind
  namespace: istio-system
spec:
  tls:
    backend:
      clientCertificateRef:
        group: ""
        kind: ConfigMap
        name: my-cert-http
  addresses:
  - value: istio-ingressgateway
    type: Hostname
  gatewayClassName: istio
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
---
# Gateway with a malformed secret - should have ResolvedRefs=False/InvalidClientCertificateRef
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: backend-tls-malformed
  namespace: istio-system
spec:
  tls:
    backend:
      clientCertificateRef:
        group: ""
        kind: Secret
        name: malformed
  addresses:
  - value: istio-ingressgateway
    type: Hostname
  gatewayClassName: istio
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
