apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
spec:
  profile: empty
  hub: registry.istio.io/release
  tag: 1.1.4
  meshConfig:
    enablePrometheusMerge: true
    rootNamespace: istio-control
    outboundTrafficPolicy:
      mode: REGISTRY_ONLY
    defaultConfig:
      discoveryAddress: my-discovery:123
      drainDuration: 12s
      controlPlaneAuthPolicy: NONE
    accessLogFormat: |
      {
        "key": "val"
      }
  components:
    pilot:
      enabled: true
