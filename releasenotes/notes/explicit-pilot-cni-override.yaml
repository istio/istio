apiVersion: release-notes/v2
kind: bug-fix
area: installation
releaseNotes:
- |
  **Fixed** an issue where an explicitly set `values.pilot.cni.enabled` was silently
  ignored when the `cni` component was also enabled (for example via `components.cni.enabled`
  or the `ambient` profile). The explicit value now correctly overrides the value derived
  from the component, allowing the CNI DaemonSet to be installed while sidecar-injected pods
  continue to use the `istio-init` init container.
