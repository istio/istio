# ============================================================
# SCENARIO: Cross-namespace gateway merging
# ============================================================
#
# Namespace "app-team" has a managed GatewayAPI Gateway.
# An attacker in namespace "attacker" creates an Istio Gateway CRD
# whose selector matches the managed gateway's pod labels, adding
# a listener on the victim's proxy.
#
# With PILOT_ENABLE_STRICT_GATEWAY_MERGING=true (default), the
# attacker's Istio Gateway is filtered out before merging.
# ============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: app-team
---
apiVersion: v1
kind: Namespace
metadata:
  name: attacker
---
# 1. Managed GatewayAPI Gateway in app-team namespace.
#    Istio auto-creates a Deployment + Service for this.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: app-gateway
  namespace: app-team
spec:
  gatewayClassName: istio
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    hostname: "app.example.com"
    allowedRoutes:
      namespaces:
        from: Same
---
# 2. ATTACKER: Istio Gateway CRD in a different namespace.
#    The selector targets the managed gateway's pod labels,
#    attempting to add a listener on the victim's proxy.
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: evil-gateway
  namespace: attacker
spec:
  selector:
    gateway.networking.k8s.io/gateway-name: app-gateway
  servers:
  - hosts:
    - "evil.example.com"
    port:
      name: http-8080
      number: 8080
      protocol: HTTP
