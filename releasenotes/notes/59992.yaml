apiVersion: release-notes/v2
kind: security-fix
area: security
issue:
  - 59992
releaseNotes:
  - |
    **Fixed** an authorization bypass in `AuthorizationPolicy` matching for SPIFFE identities and namespaces. Regex metacharacters in fields like `source.principals` (suffix matching), `source.namespaces`, and `source.trustDomains` were not properly escaped in the generated Envoy configuration, potentially allowing unintended identities to match policy rules.
securityNotes:
  - |
    Fixed an authorization bypass in `AuthorizationPolicy` where regex metacharacters in certain identity fields were embedded in the generated Envoy `SafeRegex` without escaping. As a result, legal Kubernetes names containing characters like `.` or `[` could be treated as regex wildcards, admitting identities beyond the policy author's intent. This issue affected `source.principals` (specifically suffix matches starting with `*`), `source.namespaces`, and `source.trustDomains`.

    **Credit**: Reported by Aonex(handle TBD).
