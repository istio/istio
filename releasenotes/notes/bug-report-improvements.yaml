apiVersion: release-notes/v2
kind: feature
area: istioctl
releaseNotes:
- |
  **Improved** `istioctl bug-report` performance and added `--skip-cluster-dump`, `--skip-analyze`,
  `--skip-proxy-debug`, `--skip-netstat`, and `--skip-coredumps` flags to allow skipping expensive
  sections of the report. Also fixed log fetching and include/exclude filtering for pod selection.
