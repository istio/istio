---
# Example 5: DPoP with AuthorizationPolicy
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: authz-dpop
  namespace: default
  annotations:
    security.istio.io/dpop-enabled: "true"
    security.istio.io/dpop-required: "true"
    security.istio.io/dpop-max-age: "5m"
spec:
  selector:
    matchLabels:
      app: protected-api
  jwtRules:
  - issuer: "https://auth.example.com"
    jwksUri: "https://auth.example.com/.well-known/jwks.json"
    fromHeaders:
    - name: "Authorization"
      prefix: "Bearer "

---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: dpop-authorization
  namespace: default
spec:
  selector:
    matchLabels:
      app: protected-api
  action: ALLOW
  rules:
  - when:
    - key: request.auth.claims[scope]
      values: ["api:read", "api:write"]
  - when:
    - key: request.auth.claims[role]
      values: ["api_user", "admin"]

---
# Example 6: DPoP with different extraction methods
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: dpop-multiple-sources
  namespace: default
  annotations:
    security.istio.io/dpop-enabled: "true"
    security.istio.io/dpop-required: "false"
    security.istio.io/dpop-max-age: "10m"
spec:
  selector:
    matchLabels:
      app: flexible-app
  jwtRules:
  - issuer: "https://auth.example.com"
    jwksUri: "https://auth.example.com/.well-known/jwks.json"
    fromHeaders:
    - name: "Authorization"
      prefix: "Bearer "
    fromParams:
    - "access_token"
    fromCookies:
    - "session_token"

