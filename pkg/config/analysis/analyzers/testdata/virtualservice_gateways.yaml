# Broken config in a yaml config file
#
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: httpbin-gateway
spec:
  selector:
    istio: ingressgateway
---
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: crossnamespace-gw
  namespace: another
spec:
  selector:
    istio: ingressgateway
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: httpbin
spec:
  hosts:
  - "*"
  gateways:
  - httpbin-gateway # Expected: no validation error since this gateway exists
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: httpbin-bogus
spec:
  hosts:
  - "*"
  gateways:
  - httpbin-gateway-bogus # Expected: validation error since this gateway does not exist
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: httpbin-mesh
spec:
  hosts:
  - "*"
  gateways:
  - mesh # Expected: no validation error, "mesh" is a special-case value
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: cross-test
  namespace: default
spec:
  hosts:
  - "*"
  gateways:
  - another/crossnamespace-gw  # No validation error expected
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: k8s-gateway
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: httpbin-k8s-gateway
spec:
  hosts:
    - "*"
  gateways:
    - k8s-gateway   # References a gateway.networking.k8s.io Gateway — must NOT produce an error
---
# --- K8s Gateway API: bogus reference (error expected) ---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: httpbin-k8s-gateway-bogus
spec:
  hosts:
    - "*"
  gateways:
    - k8s-gateway-does-not-exist   # Neither Istio nor K8s Gateway — MUST produce an error

