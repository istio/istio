# Example 8: Gateway-level DPoP configuration
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: dpop-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: gateway-cert
    hosts:
    - api.example.com

---
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: gateway-dpop
  namespace: istio-system
  annotations:
    security.istio.io/dpop-enabled: "true"
    security.istio.io/dpop-required: "true"
    security.istio.io/dpop-max-age: "3m"
spec:
  selector:
    matchLabels:
      istio: ingressgateway
  jwtRules:
  - issuer: "https://auth.example.com"
    jwksUri: "https://auth.example.com/.well-known/jwks.json"
    fromHeaders:
    - name: "Authorization"
      prefix: "Bearer "

---
# Example 9: DPoP with custom headers and forwarding
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: dpop-advanced
  namespace: default
  annotations:
    security.istio.io/dpop-enabled: "true"
    security.istio.io/dpop-required: "true"
    security.istio.io/dpop-max-age: "5m"
spec:
  selector:
    matchLabels:
      app: advanced-app
  jwtRules:
  - issuer: "https://auth.example.com"
    jwksUri: "https://auth.example.com/.well-known/jwks.json"
    fromHeaders:
    - name: "Authorization"
      prefix: "Bearer "
    forwardOriginalToken: true
    outputPayloadToHeader: "X-JWT-Payload"
    outputClaimToHeaders:
    - claim: "sub"
      header: "X-User-Id"
    - claim: "email"
      header: "X-User-Email"

---
# Example 10: DPoP with timeout and retry configuration
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: dpop-with-timeout
  namespace: default
  annotations:
    security.istio.io/dpop-enabled: "true"
    security.istio.io/dpop-required: "true"
    security.istio.io/dpop-max-age: "5m"
spec:
  selector:
    matchLabels:
      app: resilient-app
  jwtRules:
  - issuer: "https://auth.example.com"
    jwksUri: "https://auth.example.com/.well-known/jwks.json"
    timeout: "10s"  # JWKS fetch timeout
    fromHeaders:
    - name: "Authorization"
      prefix: "Bearer "
