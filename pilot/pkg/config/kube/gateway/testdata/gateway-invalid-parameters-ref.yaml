apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: istio
spec:
  controllerName: istio.io/gateway-controller
---
# parametersRef with an unsupported group/kind must set Accepted=False with reason
# InvalidParameters (Gateway API conformance test GatewayInvalidParametersRef).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: invalid-parameters-type
  namespace: istio-system
spec:
  addresses:
  - value: istio-ingressgateway
    type: Hostname
  gatewayClassName: istio
  infrastructure:
    parametersRef:
      group: invalid.io
      kind: InvalidParameters
      name: invalid
  listeners:
  - name: default
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
---
# parametersRef pointing at a ConfigMap that does not exist must also set
# Accepted=False with reason InvalidParameters.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: missing-parameters-configmap
  namespace: istio-system
spec:
  addresses:
  - value: istio-ingressgateway
    type: Hostname
  gatewayClassName: istio
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: does-not-exist
  listeners:
  - name: default
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
---
# parametersRef pointing at an existing ConfigMap is valid; Accepted stays True.
apiVersion: v1
kind: ConfigMap
metadata:
  name: valid-parameters
  namespace: istio-system
data:
  deployment: |
    spec:
      replicas: 2
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: valid-parameters-configmap
  namespace: istio-system
spec:
  addresses:
  - value: istio-ingressgateway
    type: Hostname
  gatewayClassName: istio
  infrastructure:
    parametersRef:
      group: ""
      kind: ConfigMap
      name: valid-parameters
  listeners:
  - name: default
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
