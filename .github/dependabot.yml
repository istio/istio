version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "!/samples/**"
    schedule:
      interval: "daily"
    labels:
      - "release-notes-none"
    target-branch: "master"
    # The following dependencies are locked to a specific minor version and/or are updated through
    # automation (e.g. Istio API sync, Kubernetes version bumps, Envoy version bumps). We use both
    # `ignore` and `groups.exclude-patterns` for each entry:
    #   - `ignore` prevents Dependabot from opening standalone PRs for these packages.
    #   - `exclude-patterns` prevents them from being pulled into a grouped PR triggered by other
    #     updates. Without this, Dependabot can still include ignored packages in a group PR when
    #     other packages in the group have updates.
    ignore:
      - dependency-name: "istio.io/*"
      - dependency-name: "k8s.io/*"
      - dependency-name: "sigs.k8s.io/*"
      - dependency-name: "github.com/envoyproxy/go-control-plane/*"
      - dependency-name: "github.com/prometheus/prometheus"
    groups:
      all-dependencies:
        patterns:
          - "*"
        # Must mirror the ignore list above — see comment there for why both are needed.
        exclude-patterns:
          - "istio.io/*"
          - "k8s.io/*"
          - "sigs.k8s.io/*"
          - "github.com/envoyproxy/go-control-plane/*"
          - "github.com/prometheus/prometheus"

  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "!/samples/**"
    schedule:
      interval: "daily"
    labels:
      - "release-notes-none"
    target-branch: "release-1.30"
    # See master stanza above for why both ignore and exclude-patterns are required.
    ignore:
      - dependency-name: "istio.io/*"
      - dependency-name: "k8s.io/*"
      - dependency-name: "sigs.k8s.io/*"
      - dependency-name: "github.com/envoyproxy/go-control-plane/*"
      - dependency-name: "github.com/prometheus/prometheus"
    groups:
      all-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "istio.io/*"
          - "k8s.io/*"
          - "sigs.k8s.io/*"
          - "github.com/envoyproxy/go-control-plane/*"
          - "github.com/prometheus/prometheus"

  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "!/samples/**"
    schedule:
      interval: "daily"
    labels:
      - "release-notes-none"
    target-branch: "release-1.29"
    # See master stanza above for why both ignore and exclude-patterns are required.
    ignore:
      - dependency-name: "istio.io/*"
      - dependency-name: "k8s.io/*"
      - dependency-name: "sigs.k8s.io/*"
      - dependency-name: "github.com/envoyproxy/go-control-plane/*"
      - dependency-name: "github.com/prometheus/prometheus"
    groups:
      all-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "istio.io/*"
          - "k8s.io/*"
          - "sigs.k8s.io/*"
          - "github.com/envoyproxy/go-control-plane/*"
          - "github.com/prometheus/prometheus"

  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "!/samples/**"
    schedule:
      interval: "daily"
    labels:
      - "release-notes-none"
    target-branch: "release-1.28"
    # See master stanza above for why both ignore and exclude-patterns are required.
    ignore:
      - dependency-name: "istio.io/*"
      - dependency-name: "k8s.io/*"
      - dependency-name: "sigs.k8s.io/*"
      - dependency-name: "github.com/envoyproxy/go-control-plane/*"
      - dependency-name: "github.com/prometheus/prometheus"
    groups:
      all-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "istio.io/*"
          - "k8s.io/*"
          - "sigs.k8s.io/*"
          - "github.com/envoyproxy/go-control-plane/*"
          - "github.com/prometheus/prometheus"

  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "!/samples/**"
    schedule:
      interval: "daily"
    labels:
      - "release-notes-none"
    target-branch: "release-1.27"
    # See master stanza above for why both ignore and exclude-patterns are required.
    ignore:
      - dependency-name: "istio.io/*"
      - dependency-name: "k8s.io/*"
      - dependency-name: "sigs.k8s.io/*"
      - dependency-name: "github.com/envoyproxy/go-control-plane/*"
      - dependency-name: "github.com/prometheus/prometheus"
    groups:
      all-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "istio.io/*"
          - "k8s.io/*"
          - "sigs.k8s.io/*"
          - "github.com/envoyproxy/go-control-plane/*"
          - "github.com/prometheus/prometheus"

  # Ignore all dependency updates in samples/
  # We do not care about the dependencies in the samples/ directory as they are not meant
  # to be part of production systems. They require manual testing and validation, as well as
  # deployment.
  - package-ecosystem: "pip"
    directories:
      - "/samples/**"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "*"

  - package-ecosystem: "npm"
    directories:
      - "/samples/**"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "*"

  - package-ecosystem: "bundler"
    directories:
      - "/samples/**"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "*"

  - package-ecosystem: "gomod"
    directories:
      - "/samples/**"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "*"
