apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: se-https
  namespace: default
spec:
  hosts:
  - example.com
  ports:
  - name: https-13835
    number: 13835
    protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
---
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: se-http
  namespace: default
spec:
  hosts:
  - example.com
  ports:
  - name: http-13835
    number: 13835
    protocol: HTTP
  resolution: DNS
  location: MESH_EXTERNAL
---
# No conflict: same host, same port, same protocol
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: se-no-conflict
  namespace: default
spec:
  hosts:
  - other.com
  ports:
  - name: https-443
    number: 443
    protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
