apiVersion: release-notes/v2
kind: bug-fix
area: traffic-management
issue:
  - 58250
releaseNotes:
  - |
    **Fixed** a memory leak in Istiod where `needResync` entries for failed pod IPs were never cleaned up.
    When a pod fails, it is filtered from the pod cache by the `status.phase!=Failed` field selector
    (introduced in #58250 to prevent OOMKills during mass evictions). If the corresponding EndpointSlice
    IP was subsequently removed via an UPDATE event rather than a DELETE, `endpointDeleted` was never
    called for the removed address, causing the `needResync` map and the `pilot_k8s_endpoints_pending_pod_update`
    metric to grow without bound.
