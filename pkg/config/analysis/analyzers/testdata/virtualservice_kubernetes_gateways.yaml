apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: my-gateway
  namespace: default
spec:
  gatewayClassName: istio
  listeners:
  - name: http
    hostname: example.com
    port: 80
    protocol: HTTP
---
apiVersion: v1
kind: Service
metadata:
  name: my-service
  namespace: default
spec:
  ports:
  - name: http
    port: 80
    targetPort: 8080
  selector:
    app: my-service
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: my-vs
  namespace: default
spec:
  hosts:
  - example.com
  gateways:
  - default/my-gateway
  http:
  - route:
    - destination:
        host: my-service
        port:
          number: 80
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: my-vs-host-mismatch
  namespace: default
spec:
  hosts:
  - wrong.example.com
  gateways:
  - default/my-gateway
  http:
  - route:
    - destination:
        host: my-service
        port:
          number: 80
