apiVersion: release-notes/v2
kind: bug-fix
area: traffic-management

releaseNotes:
  - |
    **Fixed** an issue where an ambient-enrolled pod could remain outside the host health-probe ipset following a
    node or kubelet restart, causing kubelet probes to be redirected to ztunnel and rejected until the `istio-cni`
    node agent restarted. The node agent now re-asserts probe ipset membership for enrolled pods during reconciliation.
