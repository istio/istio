apiVersion: extensions.istio.io/v1alpha1
kind: TrafficExtension
metadata:
  name: {{ .ExtensionFilterName }}-stats
spec:
  phase: STATS
  targetRefs:
  - kind: {{ .TargetKind }}
    group: {{ .TargetGroup }}
    name: {{ .TargetName }}
  lua:
    inlineCode: |
      function envoy_on_response(response_handle)
        local existing = response_handle:headers():get("x-phase-order")
        if existing then
          response_handle:headers():replace("x-phase-order", existing .. "3")
        else
          response_handle:headers():add("x-phase-order", "3")
        end
      end
