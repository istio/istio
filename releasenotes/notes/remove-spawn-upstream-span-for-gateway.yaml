apiVersion: release-notes/v2
kind: feature
area: telemetry
releaseNotes:
  - |
    **Removed** the `PILOT_SPAWN_UPSTREAM_SPAN_FOR_GATEWAY` feature flag. The behavior of spawning
    upstream spans for gateway requests is now always enabled. Users who previously set this to
    `false` should remove that configuration, as it will no longer have any effect.

upgradeNotes:
  - title: PILOT_SPAWN_UPSTREAM_SPAN_FOR_GATEWAY feature flag removed
    content: |
      The environment variable `PILOT_SPAWN_UPSTREAM_SPAN_FOR_GATEWAY` has been removed. The
      behavior it controlled (spawning a separate tracing span for each upstream request for
      gateway when using the Telemetry API) is now always enabled. Users who explicitly set
      this variable to `false` to opt out of this behavior should be aware that the opt-out
      is no longer available.
