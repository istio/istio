# "_internal_defaults_do_not_set" is a workaround for Helm limitations. Users should NOT set "._internal_defaults_do_not_set" explicitly, but rather directly set the fields internally.
# For instance, instead of `--set _internal_defaults_do_not_set.foo=bar``, just set `--set foo=bar`.
_internal_defaults_do_not_set:
  global:
    # Used to locate istiod.
    istioNamespace: "istio-system"

    # If true, install istio-reader service account and associated cluster role/binding,
    # which are used for multicluster remote-secret workflows.
    enableReaderRBAC: true
    # Optionally specify a custom service account to bind to the istio-reader ClusterRole.
    # When set, the default istio-reader-service-account is not created.
    # readerServiceAccount:
    #   name: custom-reader-sa
    #   namespace: custom-namespace

  base:
    # Validation webhook configuration url
    # For example: https://$remotePilotAddress:15017/validate
    validationURL: ""

  istiodRemote:
    # Sidecar injector mutating webhook configuration url
    # For example: https://$remotePilotAddress:15017/inject
    injectionURL: ""

  # Revision is set as 'version' label and part of the resource names when installing multiple control planes.
  revision: ""

  sidecarInjectorWebhook:
    # This enables injection of sidecar in all namespaces,
    enableNamespacesByDefault: false

