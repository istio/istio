apiVersion: extensions.istio.io/v1alpha1
kind: TrafficExtension
metadata:
  name: {{ .ExtensionFilterName }}-authz
spec:
  phase: AUTHZ
  selector:
    matchLabels:
      app: {{ .TargetAppName }}
  lua:
    inlineCode: |
      function envoy_on_response(response_handle)
        local existing = response_handle:headers():get("x-phase-order")
        if existing then
          response_handle:headers():replace("x-phase-order", existing .. "2")
        else
          response_handle:headers():add("x-phase-order", "2")
        end
      end
